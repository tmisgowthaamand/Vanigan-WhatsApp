<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/vaniganlogo.png" id="dynamic-favicon" />
    <link rel="apple-touch-icon" href="/vaniganlogo.png" />
    <meta property="og:image" content="/vaniganlogo.png" />
    <script>
      (function() {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = 64;
          canvas.height = 64;
          const ctx = canvas.getContext('2d');
          ctx.beginPath();
          ctx.arc(32, 32, 32, 0, Math.PI * 2);
          ctx.clip();
          ctx.drawImage(img, 0, 0, 64, 64);
          const link = document.getElementById('dynamic-favicon');
          if (link) link.href = canvas.toDataURL('image/png');
        };
        img.src = '/favicon.png';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanigan App - WhatsApp Business Discovery</title>
    <meta name="description" content="Connect local businesses, members, organizers, news, maps, gallery media, and subscription flows through one fast WhatsApp assistant." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
