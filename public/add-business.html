<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Business - Vanigan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; margin: 0; }
    .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #1e293b; margin-top: 0; }
    p.subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px; }
    label { font-weight: 600; margin-top: 15px; display: block; color: #475569; font-size: 14px; }
    input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
    input:focus, select:focus { outline: none; border-color: #25D366; box-shadow: 0 0 0 2px rgba(37, 211, 102, 0.2); }
    button { width: 100%; background: #25D366; color: white; border: none; padding: 14px; margin-top: 25px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
    button:hover { background: #1ebd5a; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Add Your Business</h2>
    <p class="subtitle">Fill out the details below to register your business on the Vanigan App.</p>
    
    <form id="bizForm">
      <input type="hidden" id="whatsappNumber" name="whatsappNumber">
      
      <label>Business Name</label>
      <input type="text" id="businessName" name="businessName" placeholder="E.g., Sri Lakshmi Stores" required>
      
      <label>Full Address</label>
      <input type="text" id="address" name="address" placeholder="E.g., 45, Main Road..." required>
      
      <label>District</label>
      <select id="district" name="district" required>
        <option value="">Select District</option>
      </select>
      
      <label>Assembly Constituency</label>
      <select id="assembly" name="assembly" required disabled>
        <option value="">Select Assembly</option>
      </select>
      
      <label>Business Photo (Max 10MB)</label>
      <input type="file" id="photo" name="photo" accept="image/*" required>
      
      <label>Contact Number</label>
      <input type="text" id="contact" name="contact" placeholder="E.g., 9876543210" required>
      
      <label>Category</label>
      <select id="category" name="category" required>
        <option value="">Select Category</option>
        <option value="Retail">Retail</option>
        <option value="Manufacturing">Manufacturing</option>
        <option value="Services">Services</option>
        <option value="Food">Food</option>
        <option value="Electronics">Electronics</option>
        <option value="Textiles">Textiles</option>
        <option value="Agriculture">Agriculture</option>
        <option value="Other">Other</option>
      </select>

      <button type="submit">Submit Business</button>
    </form>
    <div id="statusMsg" style="margin-top: 20px; text-align: center; font-weight: 600; padding: 15px; border-radius: 8px; display: none;"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('whatsappNumber').value = urlParams.get('phone') || '';

    let districtsData = [];

    async function checkStatus(phone) {
      if (!phone) return;
      try {
        const res = await fetch(`/api/business/status?phone=${phone}`);
        const json = await res.json();
        if (json.exists) {
          document.getElementById('bizForm').style.display = 'none';
          const msg = document.getElementById('statusMsg');
          let statusText = json.status === 'pending' ? 'under review' : json.status;
          msg.innerHTML = `ℹ️ You have already submitted a business.<br><br>Current Status: <b>${statusText.toUpperCase()}</b><br><br>You can close this window.`;
          msg.style.background = '#e0f2fe';
          msg.style.color = '#075985';
          msg.style.display = 'block';
          return true; // Stop loading form
        }
      } catch (e) {
        console.error('Status check failed', e);
      }
      return false;
    }

    async function loadDistricts() {
      try {
        const res = await fetch('/api/districts');
        const json = await res.json();
        if (json.success) {
          districtsData = json.data;
          const distSelect = document.getElementById('district');
          districtsData.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.name;
            opt.textContent = d.name;
            distSelect.appendChild(opt);
          });
        }
      } catch (e) {
        console.error('Failed to load districts', e);
      }
    }

    document.getElementById('district').addEventListener('change', (e) => {
      const selectedDist = e.target.value;
      const asmSelect = document.getElementById('assembly');
      asmSelect.innerHTML = '<option value="">Select Assembly</option>';
      
      if (!selectedDist) {
        asmSelect.disabled = true;
        return;
      }
      
      const distData = districtsData.find(d => d.name === selectedDist);
      if (distData && distData.assemblies) {
        distData.assemblies.forEach(a => {
          const opt = document.createElement('option');
          opt.value = a.name;
          opt.textContent = a.name;
          asmSelect.appendChild(opt);
        });
        asmSelect.disabled = false;
      }
    });

    async function init() {
      const phone = urlParams.get('phone');
      const alreadySubmitted = await checkStatus(phone);
      if (!alreadySubmitted) {
        loadDistricts();
      }
    }
    
    init();

    document.getElementById('bizForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const photoInput = document.getElementById('photo');
      if (photoInput.files.length > 0 && photoInput.files[0].size > 10 * 1024 * 1024) {
        alert("Photo size must be less than 10MB");
        return;
      }

      const btn = e.target.querySelector('button');
      btn.textContent = 'Submitting...';
      btn.disabled = true;

      const formData = new FormData(e.target);

      try {
        const res = await fetch('/api/business/submit-form', {
          method: 'POST',
          body: formData
        });
        
        if (res.ok) {
          document.getElementById('bizForm').style.display = 'none';
          const msg = document.getElementById('statusMsg');
          msg.innerHTML = '✅ Business submitted successfully!<br><br>You can close this window and check your WhatsApp for confirmation.';
          msg.style.background = '#dcfce7';
          msg.style.color = '#166534';
          msg.style.display = 'block';
        } else {
          throw new Error('Failed');
        }
      } catch (err) {
        const msg = document.getElementById('statusMsg');
        msg.textContent = '❌ Failed to submit. Please try again.';
        msg.style.background = '#fee2e2';
        msg.style.color = '#991b1b';
        msg.style.display = 'block';
        btn.textContent = 'Submit Business';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
