<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Business - Vanigan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; margin: 0; }
    .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #1e293b; margin-top: 0; }
    p.subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px; }
    label { font-weight: 600; margin-top: 15px; display: block; color: #475569; font-size: 14px; }
    input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
    input:focus, select:focus { outline: none; border-color: #25D366; box-shadow: 0 0 0 2px rgba(37, 211, 102, 0.2); }
    button { width: 100%; background: #25D366; color: white; border: none; padding: 14px; margin-top: 25px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
    button:hover { background: #1ebd5a; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Add Your Business</h2>
    <p class="subtitle">Fill out the details below to register your business on the Vanigan App.</p>
    
    <form id="bizForm">
      <input type="hidden" id="whatsappNumber" name="whatsappNumber">
      
      <label>Business Name</label>
      <input type="text" id="businessName" name="businessName" placeholder="E.g., Sri Lakshmi Stores" required>
      
      <label>Full Address</label>
      <input type="text" id="address" name="address" placeholder="E.g., 45, Main Road..." required>
      
      <label>District</label>
      <input type="text" id="district" name="district" placeholder="E.g., Chennai" required>
      
      <label>Assembly Constituency</label>
      <input type="text" id="assembly" name="assembly" placeholder="E.g., T. Nagar" required>
      
      <label>Contact Number</label>
      <input type="text" id="contact" name="contact" placeholder="E.g., 9876543210" required>
      
      <label>Category</label>
      <select id="category" name="category" required>
        <option value="">Select Category</option>
        <option value="Retail">Retail</option>
        <option value="Manufacturing">Manufacturing</option>
        <option value="Services">Services</option>
        <option value="Food">Food</option>
        <option value="Electronics">Electronics</option>
        <option value="Textiles">Textiles</option>
        <option value="Agriculture">Agriculture</option>
        <option value="Other">Other</option>
      </select>

      <button type="submit">Submit Business</button>
    </form>
    <div id="statusMsg" style="margin-top: 20px; text-align: center; font-weight: 600; padding: 15px; border-radius: 8px; display: none;"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('whatsappNumber').value = urlParams.get('phone') || '';

    document.getElementById('bizForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'Submitting...';
      btn.disabled = true;

      const formData = {
        whatsappNumber: document.getElementById('whatsappNumber').value,
        businessName: document.getElementById('businessName').value,
        address: document.getElementById('address').value,
        district: document.getElementById('district').value,
        assembly: document.getElementById('assembly').value,
        contact: document.getElementById('contact').value,
        category: document.getElementById('category').value,
      };

      try {
        const res = await fetch('/api/business/submit-form', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        
        if (res.ok) {
          document.getElementById('bizForm').style.display = 'none';
          const msg = document.getElementById('statusMsg');
          msg.innerHTML = '✅ Business submitted successfully!<br><br>You can close this window and check your WhatsApp for confirmation.';
          msg.style.background = '#dcfce7';
          msg.style.color = '#166534';
          msg.style.display = 'block';
        } else {
          throw new Error('Failed');
        }
      } catch (err) {
        const msg = document.getElementById('statusMsg');
        msg.textContent = '❌ Failed to submit. Please try again.';
        msg.style.background = '#fee2e2';
        msg.style.color = '#991b1b';
        msg.style.display = 'block';
        btn.textContent = 'Submit Business';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
